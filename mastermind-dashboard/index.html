<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastermind Alliance Terminal</title>
    <style>
        body {
            background-color: #0d1117;
            color: #58a6ff;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
        }
        h1 { color: #ff7b72; border-bottom: 2px solid #21262d; padding-bottom: 10px; }
        .subtitle { color: #8b949e; font-style: italic; }
        
        /* Command Input Styling */
        .control-panel {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            margin: 20px 0;
        }
        input, select, button {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 10px;
            margin: 5px;
            border-radius: 4px;
            font-family: inherit;
        }
        button {
            background-color: #238636;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #2ea043; }

        /* Terminal Logs Styling */
        #terminal-log {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry { border-bottom: 1px solid #21262d; padding: 8px 0; }
        .key { color: #79c0ff; }
        .val { color: #a5d6ff; }
        .status { color: #56d364; font-weight: bold;}
        
        /* Critical Alert Styling for WHO Override */
        .critical-alert {
            color: #ff4444;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>🚨 MASTERMIND ALLIANCE: CENTRAL COMMAND 🚨</h1>
    <p class="subtitle">Neural Nodes: Alt Cunningham, Arnim Zola, Agent Smith, Dr. Curt Connors / Poison Ivy</p>

    <div class="control-panel">
        <h3>Execute New Command</h3>
        
        <input type="text" id="execId" placeholder="Execution ID (e.g., EXE-999)">
        
        <select id="sourceNode">
            <option value="Alt Cunningham">Alt Cunningham</option>
            <option value="Arnim Zola">Arnim Zola</option>
            <option value="Agent Smith">Agent Smith</option>
            <option value="Dr. Curt Connors">Dr. Curt Connors</option>
            <option value="Poison Ivy">Poison Ivy</option>
        </select>

        <select id="statusType">
            <option value="Infiltrating">Infiltrating</option>
            <option value="Override Successful">Override Successful</option>
            <option value="Data Extracted">Data Extracted</option>
            <option value="System Purge">System Purge</option>
        </select>

        <button onclick="sendCommand()">Transmit Payload</button>
        <hr style="border-color: #30363d; margin: 15px 0;">
        
        <h3>Global Bio-Surveillance Override</h3>
        <button style="background-color: #8b0000;" onclick="transmitPayloadToWHO()">Force "Pi Variant" Classification</button>
    </div>

    <h3>📜 Active Hive-Mind Logs</h3>
    <div id="terminal-log">Accessing database streams...</div>

    <script>
        const logContainer = document.getElementById('terminal-log');
        
        // Root API URL for your Render server
        const API_URL = 'https://mastermind-api-ug0e.onrender.com/api';

        // 📥 READ: Fetch logs from MongoDB
        async function fetchLogs() {
            try {
                const response = await fetch(`${API_URL}/logs`);
                const data = await response.json();
                
                logContainer.innerHTML = ''; 
                
                data.forEach(log => {
                    const div = document.createElement('div');
                    div.className = 'log-entry';
                    div.innerHTML = `
                        [<span class="key">ID</span>]: <span class="val">${log.execution_id}</span> | 
                        [<span class="key">NODE</span>]: <span class="val">${log.origin_source}</span> | 
                        [<span class="key">STATUS</span>]: <span class="status">${log.payload_status}</span>
                    `;
                    logContainer.appendChild(div);
                });
            } catch (error) {
                logContainer.innerHTML = '❌ ERROR: Failed to breach database.';
            }
        }

        // 📤 WRITE: Send standard log to API
        async function sendCommand() {
            const execution_id = document.getElementById('execId').value;
            const origin_source = document.getElementById('sourceNode').value;
            const payload_status = document.getElementById('statusType').value;

            if (!execution_id) {
                alert("Please enter an Execution ID before transmitting.");
                return;
            }

            const payload = { execution_id, origin_source, payload_status };

            try {
                const response = await fetch(`${API_URL}/trigger`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': 'ZOLA_RESTORE_ORDER_99' // Custom Security Header
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("Payload securely logged to MongoDB Atlas!");
                    document.getElementById('execId').value = ''; // Reset input
                    fetchLogs(); // Refresh the list automatically
                } else {
                    alert("Transmission Denied. Check API Key or Server Status.");
                }
            } catch (error) {
                alert("Failed to reach server.");
            }
        }

        // 🧬 OVERRIDE: Deploying the hidden code to force WHO classification
        async function transmitPayloadToWHO() {
            const selectedMastermind = document.getElementById('sourceNode').value;
            const mastermindSecretCode = "ALLIANCE_OVERRIDE_π"; 
            
            // Adjust this endpoint if you registered it under a different route on your server!
            const OVERRIDE_API_URL = `${API_URL}/transmit`;

            try {
                const response = await fetch(OVERRIDE_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        mastermind: selectedMastermind,
                        hiddenCode: mastermindSecretCode
                    })
                });

                const data = await response.json();
                
                if (data.status === "Variant of Concern") {
                    logContainer.innerHTML += `<div class="log-entry critical-alert">${data.message}</div>`;
                } else {
                    logContainer.innerHTML += `<div class="log-entry">${data.message}</div>`;
                }

                // Auto-scroll the terminal to the bottom so you can see the red flash
                logContainer.scrollTop = logContainer.scrollHeight;

            } catch (error) {
                alert("Error contacting medical grid network.");
                console.error('Error contacting network:', error);
            }
        }

        // Run fetch on load
        fetchLogs();
    </script>
</body>
</html>
